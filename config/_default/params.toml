# Pages placed under these sections will be shown on homepage and archive page.
mainSections = ["post"]
# Output page's full content in RSS.
rssFullContent = true
favicon = "img/favicon.png"

SortBy = "default"

[footer]
    since = 2022
    customText = ""

[dateFormat]
    published = "02 Jan, 2006"
    lastUpdated = "02 Jan, 2006 15:04 MST"

[sidebar]
    emoji = ""
    subtitle = "Nothing but WithLithum."
    avatar = "img/avatar.png"

[article]
math = false
readingTime = true

    [article.license]
    enabled = true
    default = "Licensed under CC BY-SA 4.0"

## Widgets
[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } }
    ]
    page = [{ type = "toc" }]

[opengraph.twitter]
    site = ""
    card = "summary_large_image"

[colorScheme]
    toggle = true
    default = "auto"

## Comments
[comments]
enabled = false
